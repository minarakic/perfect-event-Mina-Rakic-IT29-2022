global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'spring-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - user-service:8080
          - event-service:8081
          - booking-service:8082
          - notification-service:8083
          - api-gateway:8085